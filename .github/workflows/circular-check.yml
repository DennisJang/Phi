name: Stage 1 CI gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Circular dependency check
        run: npm run circular-check

      - name: TypeScript build
        run: npm run build

      - name: Tests
        run: npm run test:ci
